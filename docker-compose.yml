services:
  mongo:
    image: mongo:7
    container_name: poc-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      # Credenciais genéricas só para a POC (NÃO use em produção)
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example
    volumes:
      - mongo-data:/data/db

  # GUI oficial opcional, útil para mostrar que existe a ferramenta padrão
  # e comparar com o app que construímos. Acesse em http://localhost:8081
  mongo-express:
    image: mongo-express:1.0.2
    container_name: poc-mongo-express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: root
      ME_CONFIG_MONGODB_ADMINPASSWORD: example
      ME_CONFIG_MONGODB_URL: mongodb://root:example@mongo:27017/
      ME_CONFIG_BASICAUTH: "false"
    depends_on:
      - mongo

volumes:
  mongo-data:
